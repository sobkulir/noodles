<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />

    <title>p5.js template</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            background: white;
            overflow: hidden;
        }

        #container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* canvas {
            box-shadow: 0 5px 30px 0 rgba(0, 0, 0, 0.1);
        } */

        /* --- Tweaks Panel --- */
        #tweaks-panel {
            --menu-top-pos: 27;
            /* Adjustable % from the top: 0 = top, 50 = middle, 100 = bottom */

            display: none;
            flex-shrink: 0;
            width: 0;
            overflow: hidden;
            background: #fff;
            border-left: 1px solid #999;
            box-sizing: border-box;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        @media (min-width: 768px) {
            #tweaks-panel {
                display: block;
            }
        }

        #tweaks-panel.open {
            width: 280px;
        }

        #tweaks-panel-inner {
            position: absolute;
            top: calc(var(--menu-top-pos) * 1%);
            transform: translateY(calc(var(--menu-top-pos) * -1%));
            width: 280px;
            padding: 24px 16px;
            box-sizing: border-box;
        }

        #tweaks-panel h2 {
            margin: 0 0 20px 0;
            padding-left: calc(280px / 4);
            /* 1/3 of panel width, offset for padding */
            font-size: 20px;
        }

        #tweaks-panel hr {
            margin: 22px 0;
        }

        .tweak-row {
            margin-bottom: 14px;
        }

        .tweak-row label {
            display: block;
            margin-bottom: 3px;
        }

        .tweak-row input[type="range"] {
            display: block;
            width: 100%;
        }

        #btn-redraw,
        #btn-pause {
            padding: 5px 14px;
            font-size: 12px;
            cursor: pointer;
        }

        @keyframes fadeHint {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #tweaks-hint {
            position: fixed;
            top: 12px;
            right: 16px;
            font-size: 14px;
            color: #333;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #tweaks-hint.show-hint {
            animation: fadeHint 1.5s ease-out forwards;
        }

        @media (max-width: 767px) {
            #tweaks-hint {
                display: none;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.1/lib/p5.js"></script>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.2.0/addons/p5.sound.min.js"></script> -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script> -->
    <!-- <script src="https://unpkg.com/p5.js-svg@1.3.1"></script> -->
    <!-- <script src="./steganosnapshot.js"></script> -->
    <!-- <script type="module" src="modules/QuadTree.mjs"></script>
  <script type="module" src="modules/Rect.mjs"></script> -->

    <script>
        let USER_MRIEZKA_SIZE = 32;
        let USER_LINE_WIDTH_FACTOR = 0.41;
        let USER_LINE_SQUIGLINESS = 0.64;
        let USER_PASSES_PER_FRAME = 2;

        // filled in setup()
        let MRIEZKA_SIZE = null;
        let SQUARE_BORDER = null;
        let NUM_PATHS = null;
        let SQUIGGLY_DIV = null;

        const ALLOW_DIAGONAL = true;
        const NUM_TRIALS = 7000;
        const USED_TRIAL_ID = -1;
        let PASSES_PER_FRAME = USER_PASSES_PER_FRAME;

        window.P5 = p5;
        let vw, vh, vmin, vmax;
        let p5sketch;

        let mriezka;

        class Square {
            constructor(row, col) {
                this.lastTrialId = 0;
                this.row = row;
                this.col = col;

                let randOffset = () => p5sketch.random(SQUARE_BORDER, MRIEZKA_SIZE - SQUARE_BORDER);
                this.offX = randOffset();
                this.offY = randOffset();
            }
        }

        let generateOnePath = (trialId, mriezka, width, height, sketch) => {
            let curPath = [];
            let cur = null;
            let num_trials = 0;
            const MAX_ATTEMPTS = 500
            while (cur == null && num_trials++ < MAX_ATTEMPTS) {
                let hmm = mriezka[Math.floor(sketch.random(height))][Math.floor(sketch.random(width))];
                cur = (hmm.lastTrialId != USED_TRIAL_ID) ? hmm : null;
            }
            if (cur == null) {
                return [];
            }

            cur.lastTrialId = trialId;
            curPath.push(cur);

            let dirs = [
                [1, 0],
                [-1, 0],
                [0, 1],
                [0, -1]
            ];

            if (ALLOW_DIAGONAL) {
                dirs.push(
                    [-1, -1],
                    [1, -1],
                    [-1, 1],
                    [1, 1],
                )
            }

            while (true) {
                // choose rand out of dirs
                let allowed = [];
                for (let dir of dirs) {
                    let next = mriezka[cur.row + dir[0]]?.[cur.col + dir[1]];
                    if (next && next.lastTrialId != trialId && next.lastTrialId != USED_TRIAL_ID) {
                        allowed.push(next);
                    }
                }

                if (allowed.length == 0) {
                    break;
                }

                let next = allowed[Math.floor(sketch.random(allowed.length))];
                next.lastTrialId = trialId;
                cur = next;
                curPath.push(cur);
            }

            return curPath;
        };

        let generatePath = (mriezka, width, height, sketch) => {
            let paths = []
            let used_squares = 0;
            const total_squares = width * height;
            let i = 0;
            while (used_squares < total_squares && i < NUM_PATHS) {
                let trials = Array(Math.floor(NUM_TRIALS / (i + 1))).fill(0).map((x, j) =>
                    generateOnePath(i * NUM_TRIALS + j + 5, mriezka, width, height, sketch)
                );
                let p = trials.reduce(
                    (accArr, curArr) => { return (accArr.length > curArr.length) ? accArr : curArr },
                    []
                );
                if (p.length == 0) {
                    break;
                }

                for (let j = 0; j < p.length; ++j) {
                    ++used_squares;
                    mriezka[p[j].row][p[j].col].lastTrialId = USED_TRIAL_ID;
                }

                paths.push(p)
                ++i
            }

            return paths;
        };

        let drawPath = (path, sketch) => {
            // path : Array<Square>

            sketch.beginShape();
            sketch.strokeWeight(0.05 + sketch.noise(path.length) * 0.5)
            const color = sketch.color(0, 0, 0);
            color.setAlpha(10)
            sketch.stroke(color)
            sketch.noFill();
            // sketch.curveTightness(sketch.random(3) - 1.5)
            sketch.curveVertex(
                path[0].col * MRIEZKA_SIZE + path[0].offX,
                path[0].row * MRIEZKA_SIZE + path[0].offY
            );
            for (let i = 0; i < path.length; i++) {
                let cur = path[i];
                let next = path[i + 1];

                sketch.curveVertex(cur.col * MRIEZKA_SIZE + cur.offX, cur.row * MRIEZKA_SIZE + cur.offY)

                /*sketch.line(
                    cur.col * MRIEZKA_SIZE + cur.offX,
                    cur.row * MRIEZKA_SIZE + cur.offY,
                    next.col * MRIEZKA_SIZE + next.offX,
                    next.row * MRIEZKA_SIZE + next.offY
                );*/
            }
            sketch.curveVertex(
                path[path.length - 1].col * MRIEZKA_SIZE +
                path[path.length - 1].offX,
                path[path.length - 1].row * MRIEZKA_SIZE +
                path[path.length - 1].offY
            );
            sketch.endShape();

            for (let i = 0; i < path.length; i++) {
                let cur = path[i];
                sketch.strokeWeight(1);
                sketch.point(
                    cur.col * MRIEZKA_SIZE + cur.offX,
                    cur.row * MRIEZKA_SIZE + cur.offY
                );
                sketch.strokeWeight(1);
            }
        }

        new P5((sketch) => {
            sketch.preload = () => { };

            sketch.setup = () => {
                MRIEZKA_SIZE = USER_MRIEZKA_SIZE;
                SQUARE_BORDER = (1 - USER_LINE_WIDTH_FACTOR) * Math.floor(MRIEZKA_SIZE / 2);
                NUM_PATHS = 800;
                SQUIGGLY_DIV = sketch.map(USER_LINE_SQUIGLINESS, 0, 1, 0.015, 0.001);

                const containerEl = document.getElementById('container');
                const availW = containerEl.clientWidth;
                const availH = containerEl.clientHeight;
                const BORDER_FRAC = window.innerWidth < 768 ? 0.07 : 0.09;
                const ARTWORK_BORDER = Math.max(Math.ceil(BORDER_FRAC * availW), Math.ceil(BORDER_FRAC * availH));
                const w = availW - ARTWORK_BORDER;
                const h = availH - ARTWORK_BORDER;
                const WIDTH_PX = w - (w % MRIEZKA_SIZE);
                const HEIGHT_PX = h - (h % MRIEZKA_SIZE);
                const WIDTH = WIDTH_PX / MRIEZKA_SIZE;
                const HEIGHT = HEIGHT_PX / MRIEZKA_SIZE;
                /* Seeding */
                p5sketch = sketch;
                window.p5sketch = sketch;
                sketch.createCanvas(WIDTH_PX, HEIGHT_PX);
                sketch.background(255);

                mriezka = Array(HEIGHT)
                    .fill(0)
                    .map((x, i) =>
                        Array(WIDTH)
                            .fill(0)
                            .map((y, j) => new Square(i, j))
                    );
                sketch.ellipseMode(sketch.CENTER);

                paths = generatePath(mriezka, WIDTH, HEIGHT, sketch);
            };

            sketch.draw = () => {
                // sketch.background(255)
                // sketch.frameRate(3)
                for (const row of mriezka) {
                    for (const square of row) {
                        const TIMES = 10
                        square.offX = MRIEZKA_SIZE / 2 + (sketch.noise(square.row * TIMES, square.col * TIMES, 0 + sketch.frameCount * SQUIGGLY_DIV) - 0.5) * (MRIEZKA_SIZE - 2 * SQUARE_BORDER)
                        square.offY = MRIEZKA_SIZE / 2 + (sketch.noise(square.row * TIMES, square.col * TIMES, 100 + sketch.frameCount * SQUIGGLY_DIV) - 0.5) * (MRIEZKA_SIZE - 2 * SQUARE_BORDER)
                    }
                }
                for (const p of paths) {
                    for (let i = 0; i < PASSES_PER_FRAME; ++i) {
                        drawPath(p, sketch)
                    }
                }
            };
        }, "container");
    </script>
</head>

<body>
    <div id="container"></div>

    <!-- Tweaks panel -->
    <div id="tweaks-panel">
        <div id="tweaks-panel-inner">
            <h2>Options</h2>
            <hr>

            <div class="tweak-row">
                <label for="sl-grid">Zoom: <span id="val-grid"></span></label>
                <input id="sl-grid" type="range" min="6" max="100" step="1" value="">
            </div>

            <div class="tweak-row">
                <label for="sl-lwf">Line Width: <span id="val-lwf"></span></label>
                <input id="sl-lwf" type="range" min="0" max="1" step="0.01" value="">
            </div>

            <div class="tweak-row">
                <label for="sl-squig">Line Squigliness: <span id="val-squig"></span></label>
                <input id="sl-squig" type="range" min="0" max="1" step="0.01" value="">
            </div>

            <div class="tweak-row">
                <label for="sl-speed">Speed: <span id="val-speed"></span></label>
                <input id="sl-speed" type="range" min="1" max="20" step="1" value="">
            </div>

            <hr>
            <div style="display: flex; justify-content: space-between;">
                <button id="btn-redraw">Redraw (R)</button>
                <button id="btn-pause">Pause (P)</button>
            </div>
        </div>
    </div>

    <div id="tweaks-hint">Press O for Options</div>

    <script>
        const tweaksPanel = document.getElementById('tweaks-panel');
        const tweaksHint = document.getElementById('tweaks-hint');
        const btnRedraw = document.getElementById('btn-redraw');
        const btnPause = document.getElementById('btn-pause');
        let isPaused = false;

        // --- localStorage persistence ---
        const LS_KEY = 'noodles.tweaks';

        function loadFromStorage() {
            let panelOpen = false;
            try {
                const raw = localStorage.getItem(LS_KEY);
                if (raw) {
                    const saved = JSON.parse(raw);
                    if (saved.USER_MRIEZKA_SIZE != null) USER_MRIEZKA_SIZE = saved.USER_MRIEZKA_SIZE;
                    if (saved.USER_LINE_WIDTH_FACTOR != null) USER_LINE_WIDTH_FACTOR = saved.USER_LINE_WIDTH_FACTOR;
                    if (saved.USER_LINE_SQUIGLINESS != null) USER_LINE_SQUIGLINESS = saved.USER_LINE_SQUIGLINESS;
                    if (saved.USER_PASSES_PER_FRAME != null) USER_PASSES_PER_FRAME = saved.USER_PASSES_PER_FRAME;
                    if (saved.panelOpen) panelOpen = true;
                }
            } catch (e) { /* ignore corrupt data */ }

            if (panelOpen) {
                tweaksPanel.classList.add('open');
            } else {
                tweaksHint.classList.add('show-hint');
            }
        }

        function saveToStorage() {
            try {
                localStorage.setItem(LS_KEY, JSON.stringify({
                    USER_MRIEZKA_SIZE,
                    USER_LINE_WIDTH_FACTOR,
                    USER_LINE_SQUIGLINESS,
                    USER_PASSES_PER_FRAME,
                    panelOpen: tweaksPanel.classList.contains('open'),
                }));
            } catch (e) { }
        }

        // Restore before sliders are initialised
        loadFromStorage();

        // Toggle panel with O / o (desktop only)
        // After the CSS width transition ends, resize the canvas.
        tweaksPanel.addEventListener('transitionend', () => {
            if (window.p5sketch) window.p5sketch.setup();
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if ((e.target.tagName === 'INPUT' && e.target.type !== 'range') || e.target.tagName === 'TEXTAREA') return;
            if (window.innerWidth < 768) return;
            if (e.key === 'o' || e.key === 'O') {
                const isOpen = tweaksPanel.classList.toggle('open');
                tweaksHint.classList.remove('show-hint');
                tweaksHint.style.opacity = '0';
                saveToStorage();
            } else if (e.key === 'r' || e.key === 'R') {
                btnRedraw.click();
            } else if (e.key === 'p' || e.key === 'P') {
                btnPause.click();
            }
        });

        // Redraw button
        btnRedraw.addEventListener('click', () => {
            if (window.p5sketch) {
                window.p5sketch.setup();
                if (isPaused) {
                    isPaused = false;
                    btnPause.textContent = 'Pause (P)';
                    window.p5sketch.loop();
                }
            }
        });

        // Pause button
        btnPause.addEventListener('click', () => {
            if (!window.p5sketch) return;
            isPaused = !isPaused;
            if (isPaused) {
                window.p5sketch.noLoop();
                btnPause.textContent = 'Unpause (P)';
            } else {
                window.p5sketch.loop();
                btnPause.textContent = 'Pause (P)';
            }
        });

        // Helper: bind a slider to a global variable + display span
        function bindSlider(id, valId, getter, setter, fmt) {
            const sl = document.getElementById(id);
            const val = document.getElementById(valId);
            // Initialise from the current USER_* default (may have been restored from storage)
            sl.value = getter();
            val.textContent = fmt ? getter().toFixed(fmt) : getter();
            sl.addEventListener('input', () => {
                setter(parseFloat(sl.value));
                val.textContent = fmt ? parseFloat(sl.value).toFixed(fmt) : sl.value;
                saveToStorage();
            });
        }

        // Structural sliders (need Redraw)
        bindSlider('sl-grid', 'val-grid', () => USER_MRIEZKA_SIZE, v => { USER_MRIEZKA_SIZE = v; });
        bindSlider('sl-lwf', 'val-lwf', () => USER_LINE_WIDTH_FACTOR, v => { USER_LINE_WIDTH_FACTOR = v; }, 2);
        bindSlider('sl-squig', 'val-squig', () => USER_LINE_SQUIGLINESS, v => { USER_LINE_SQUIGLINESS = v; }, 2);
        // Live slider
        bindSlider('sl-speed', 'val-speed', () => USER_PASSES_PER_FRAME, v => { USER_PASSES_PER_FRAME = v; PASSES_PER_FRAME = v; });
    </script>
</body>

</html>
